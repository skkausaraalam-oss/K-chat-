<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kausar Private Hub</title>
  
  <!-- Connecting Manifest for PWA App Badge -->
  <link rel="manifest" href="./manifest.json">
  
  <!-- Tailwind CSS & FontAwesome Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* Splash Screen Style */
    .splash-screen {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #111b21;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
    }
    .logo-bounce { animation: bounce 2s infinite; }
    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }
    body { background-color: #111b21; color: #e9edef; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  </style>
</head>
<body>

  <!-- Splash Screen -->
  <div id="splashScreen" class="splash-screen">
    <div class="text-6xl text-emerald-500 logo-bounce mb-4">
      <i class="fab fa-whatsapp"></i>
    </div>
    <h1 class="text-2xl font-bold text-white">K-Chat Hub</h1>
    <p class="text-gray-400 text-sm mt-2">Securing Connection...</p>
  </div>

  <!-- Main App Layout -->
  <div class="flex flex-col h-screen max-w-md mx-auto bg-[#0b141a]">
    
    <!-- Top Header -->
    <header class="bg-[#202c33] p-4 flex justify-between items-center shadow-md">
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 bg-emerald-600 rounded-full flex items-center justify-center text-xl font-bold">K</div>
        <div>
          <h2 class="font-semibold text-white text-base">K-Chat Official</h2>
          <span class="text-xs text-emerald-400 flex items-center"><span class="w-2 h-2 bg-emerald-400 rounded-full inline-block mr-1"></span>Online</span>
        </div>
      </div>
    </header>

    <!-- Custom PWA Install Bar -->
    <div id="installBanner" class="hidden bg-emerald-600 p-3 flex justify-between items-center text-sm font-medium">
      <span>📱 Install K-Chat on your Home Screen!</span>
      <button id="btnInstall" class="bg-white text-emerald-800 px-3 py-1 rounded-full font-bold shadow">Install</button>
    </div>

    <!-- Chat Messages Area -->
    <main class="flex-1 overflow-y-auto p-4 space-y-4 bg-[url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png')] bg-opacity-10">
      
      <!-- System Update Message -->
      <div class="flex justify-center">
        <span class="bg-[#182229] text-xs text-[#8696a0] py-1 px-3 rounded shadow-sm text-center">
          🔒 End-to-end encrypted. App Badge system is live.
        </span>
      </div>

      <!-- Welcome Note -->
      <div class="flex justify-start">
        <div class="bg-[#202c33] text-[#e9edef] p-3 rounded-lg rounded-tl-none max-w-[85%] shadow-sm">
          <p class="text-sm">Bhai! Setup bilkul sahi ho gaya hai. WhatsApp jaisa notification badge check karne ke liye niche wale buttons daba kar test karo!</p>
          <span class="text-[10px] text-gray-400 block text-right mt-1">9:30 PM</span>
        </div>
      </div>
    </main>

    <!-- Badge Test Panel & Input Area -->
    <footer class="bg-[#202c33] p-3 space-y-2">
      <div class="flex justify-around bg-[#111b21] p-2 rounded-lg">
        <button onclick="setTestBadge(2)" class="bg-red-600 text-white text-xs px-2 py-1 rounded font-bold">Set 2 Badge</button>
        <button onclick="setTestBadge(5)" class="bg-red-600 text-white text-xs px-2 py-1 rounded font-bold">Set 5 Badge</button>
        <button onclick="clearTestBadge()" class="bg-gray-600 text-white text-xs px-2 py-1 rounded">Clear Badge</button>
      </div>
      
      <div class="flex items-center space-x-2">
        <div class="flex-1 bg-[#2a3942] rounded-full flex items-center px-4 py-2">
          <input type="text" placeholder="Type a message..." class="bg-transparent flex-1 outline-none text-sm text-white">
        </div>
        <button class="bg-[#00a884] text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md">
          <i class="fas fa-paper-plane text-sm"></i>
        </button>
      </div>
    </footer>
  </div>

  <script>
    // 1. Hide Splash Screen smoothly
    window.addEventListener('load', () => {
        setTimeout(() => {
            const splash = document.getElementById('splashScreen');
            splash.style.opacity = '0';
            setTimeout(() => splash.remove(), 500);
        }, 1500);
    });

    // 2. Register Service Worker (sw.js)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log("Service Worker Registered Smoothly!"))
        .catch(err => console.log("SW Registration Failed: ", err));
    }

    // 3. Smart App Installation Prompt Button
    let deferredPrompt;
    const installBanner = document.getElementById('installBanner');
    const btnInstall = document.getElementById('btnInstall');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBanner.classList.remove('hidden'); // Show install bar
    });

    btnInstall.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          console.log('User accepted the install prompt');
        }
        deferredPrompt = null;
        installBanner.classList.add('hidden');
      }
    });

    // 4. WhatsApp style App Badge Functions (IMG_20260624_203347_2.jpg Test)
    function setTestBadge(count) {
      if ('setAppBadge' in navigator) {
        navigator.setAppBadge(count).catch((error) => {
          console.error("Badge set karne me error: ", error);
        });
      } else {
        alert("Aapka launcher ya browser Home Screen Badge support nahi kar raha, par app sahi se chalegi!");
      }
    }

    function clearTestBadge() {
      if ('clearAppBadge' in navigator) {
        navigator.clearAppBadge();
      }
    }
  </script>
</body>
  </html>
